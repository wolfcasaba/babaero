name: Build Android APK
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write # needed to publish the Release

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
        continue-on-error: true
      - run: flutter build apk --release

      # Publish the APK as a Release asset so it's a DIRECT tap-to-install link
      # (github.com/<owner>/babaero/releases/latest/download/app-release.apk),
      # never a CI artifact zip.
      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Babaero v1.0.${{ github.run_number }}
          make_latest: true
          files: build/app/outputs/flutter-apk/app-release.apk
